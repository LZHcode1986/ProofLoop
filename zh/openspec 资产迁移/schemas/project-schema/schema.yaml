name: project-schema
version: 1
description: <项目名称> 的 OpenSpec 工作流 - proposal -> proofability check -> design -> specs -> tasks，并在 apply 前执行统一就绪门禁

artifacts:
  - id: proposal
    generates: proposal.md
    description: 提案文档，说明为什么要做这个变更
    template: proposal.md
    instruction: >
      生成提案文档，说明这个变更为什么需要做。

      提案必须使用中文，并且必须对齐本项目的 `config.yaml`。
      提案必须覆盖：最小闭环、范围、非目标、风险、验收标准、受影响对象、状态迁移影响、验证命令。

      重要：
      - 先研究已有规范，再填写 Capabilities。
      - 提案是设计、规范和任务的合同。
      - 提案完成后必须先做 proofability check。
      - 提案不再单独承担 proposal coverage gate。
    requires: []
  - id: design
    generates: design.md
    description: 技术设计文档，说明如何实现变更
    template: design.md
    instruction: >
      生成设计文档，说明如何实现这个变更。

      设计必须使用中文，并且把已验证的提案翻译为实现结构。
      设计必须覆盖：目标、非目标、状态迁移影响、持久化影响、API / contract 影响、权威边界、关键决策与风险。

      重要：
      - 设计必须覆盖提案中的所有非延期项。
      - 设计不再单独承担 design coverage gate。
    requires:
      - proposal
  - id: specs
    generates: specs/**/*.md
    description: 能力规格文件，定义系统应做什么
    template: spec.md
    instruction: >
      生成规格文件，定义系统应做什么。

      每个能力创建一个 spec 文件。新能力使用 proposal 中的 kebab-case 名称。
      修改已有能力时，沿用已有目录名生成 delta spec。

      重要：
      - 规格必须使用中文。
      - 规格必须复用 config.yaml 中的权威命名。
      - 每条需求至少要有一个 Scenario。
      - delta 语义只保留在 change 产物中，归档后会正规化为主规范。
    requires:
      - proposal
      - design
  - id: tasks
    generates: tasks.md
    description: 可执行任务清单
    template: tasks.md
    instruction: >
      生成任务清单，将实施工作拆成可验证步骤。

      Setup -> Blocking -> Slice 1..N -> Reconciliation。

      任务必须包含：
      - MVP 范围
      - 依赖关系
      - 并行机会
      - 切片目标
      - 独立验收标准
      - 每个实现切片结束后都必须显式加入 `verifier` 子代理独立校验任务。
      - 每个 `verifier` 任务都必须写清校验范围、`verifier` 需要检查的内容，以及 `PASS/FAIL` gate 条件。
      - 执行顺序必须保证前一切片的 `verifier PASS` 前不得进入后一切片，最后一个切片的 `verifier PASS` 前不得进入 `Reconciliation`。

      每个任务保留 `1.1 / 1.2` 风格，并支持 `[P]` 和 `[Slice-X]` 标签。

      重要：
      - 任务必须使用中文。
      - 每个任务都要有文件范围和验证命令。
      - 任务粒度必须足够清晰。
      - `interactive` change 的 `Blocking` 第一项必须是 `Proof Task`。
      - 任务写完后必须做 tasks readiness check。
    requires:
      - specs
      - design

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    进入实施前，先读取 change 产物和项目自己的实施规范。
    编写或改动代码前默认先执行 `test-driven-development`，再推进后续实现。
    OpenSpec apply 不替代项目原有的编码、测试、交付规则。
    如果 `tasks.md` 为实现切片显式定义了 `verifier` gate，执行时必须真正调用对应的 `verifier` 子代理。
    `verifier` 必须独立读取 change artifacts、相关实现、相关测试与验证结果，不得继承主代理在实现过程中的口头结论。
    按 change 类型分支推进：
    - `standard`：按 tasks 顺序推进
    - `interactive`：先完成 `Blocking` 中的 `Proof Task`，再推进后续切片
    当存在 `verifier` gate 时，必须先满足：
    - 前一实现切片的 `verifier PASS`，再进入后一实现切片
    - 最后一个实现切片的 `verifier PASS`，再进入 `Reconciliation`
    完成后必须执行 `implementation done check`，再考虑进入 archive。
