name: spec-driven
version: 1
description: <project name> reusable OpenSpec workflow schema with proposal, design, specs, tasks, and unified readiness gates before apply

artifacts:
  - id: proposal
    generates: proposal.md
    description: Proposal document explaining why this change is needed
    template: proposal.md
    instruction: >
      Generate a proposal document that explains why this change is needed.

      The proposal must be written in English and aligned with this project's `config.yaml`.
      The proposal must cover: minimal closed loop, scope, non-goals, risks, acceptance criteria, impacted areas, state transition impact, reality snapshot, critical runtime assumptions, and verification commands.

      Important:
      - Research the existing specifications first, then fill in Capabilities.
      - The proposal is the contract for design, specs, and tasks.
      - The proposal must pass proofability check first.
      - The proposal no longer carries a separate proposal coverage gate.
    requires: []
  - id: design
    generates: design.md
    description: Technical design document explaining how to implement the change
    template: design.md
    instruction: >
      Generate a design document that explains how to implement this change.

      The design must be written in English and turn the validated proposal into an implementation structure.
      The design must cover: goals, non-goals, state transition impact, persistence impact, API / contract impact, authority boundaries, and key decisions and risks.

      Important:
      - The design must cover all non-deferred items from the proposal.
      - The design no longer carries a separate design coverage gate.
    requires:
      - proposal
  - id: specs
    generates: specs/**/*.md
    description: Capability specification files that define what the system should do
    template: spec.md
    instruction: >
      Generate specification files that define what the system should do.

      Create one spec file per capability. For new capabilities, use the kebab-case name from the proposal.
      When modifying an existing capability, generate a delta spec using the existing directory name.

      Important:
      - Specifications must be written in English.
      - Specifications must reuse the authoritative names from `config.yaml`.
      - Every requirement must have at least one Scenario.
      - Delta semantics only remain in change artifacts and are normalized into the main specification after archive.
    requires:
      - proposal
      - design
  - id: tasks
    generates: tasks.md
    description: Executable task list
    template: tasks.md
    instruction: >
      Generate a task list that breaks implementation work into verifiable steps.

      Setup -> Blocking -> Slice 1..N -> Reconciliation.

      Tasks must include:
      - MVP scope
      - dependencies
      - parallel opportunities
      - Stage Acceptance Coverage Map showing how every Brain-supplied Stage Acceptance Criterion is covered by slice verifier gates or reconciliation checks
      - slice goals
      - independent acceptance criteria
      - Every implementation slice must explicitly include a separate independent `verifier` sub-agent task.
      - Each `verifier` task must state covered tasks, inspection scope, what the verifier must check, out-of-scope boundaries, and the `PASS/FAIL` gate conditions.
      - Each verifier `PASS/FAIL` gate must align with the current slice acceptance criteria and must not expand into unrelated full-stage review.
      - Execution order must ensure the previous slice's `verifier PASS` before the next slice begins, and the final slice's `verifier PASS` before `Reconciliation`.

      Keep the `1.1 / 1.2` style for each task, and support `[P]` and `[Slice-X]` tags.

      Important:
      - Tasks must be written in English.
      - Each task must include file scope and a verification command.
      - Task granularity must be clear enough to execute directly.
      - Do not decompose only by frontend / backend / db layers.
      - If the change is `interactive`, the first item in `Blocking` must be `Proof Task`.
      - Tasks must pass tasks readiness check before apply.
    requires:
      - specs
      - design

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Before implementation, read the change artifacts and the project's own implementation rules.
    Require `test-driven-development` before any code is written or modified.
    OpenSpec apply does not replace the project's original coding, testing, or delivery rules.
    If `tasks.md` explicitly defines verifier gates for implementation slices, you must actually invoke the corresponding independent `verifier` sub-agent.
    The `verifier` must independently read the change artifacts, related implementation, related tests, and verification results, and must not inherit the main agent's spoken conclusions.
    Proceed task by task, checking items off as you go.
    For `standard` changes, follow tasks in order.
    For `interactive` changes, finish the `Blocking` section's first `Proof Task` before later slice work.
    When verifier gates exist, enforce:
    - the previous implementation slice's `verifier PASS` before the next implementation slice begins
    - the final implementation slice's `verifier PASS` before `Reconciliation`
    After all tasks are done, run `implementation done check` before considering archive.
