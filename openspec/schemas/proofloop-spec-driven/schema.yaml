name: proofloop-spec-driven
version: 1
description: ProofLoop governance schema built on OpenSpec spec-driven artifacts with proof posture, verifier gates, and evidence contracts.

artifacts:
  - id: proposal
    generates: proposal.md
    description: Proposal document explaining why this change is needed
    template: proposal.md
    instruction: >
      Generate a proposal document that explains why this change is needed.

      The proposal must focus on the change intent, business value, immutable acceptance criteria, residual risks, minimum closed-loop reality snapshot, and critical runtime assumptions.

      Do not write implementation or technical design details in the proposal.
    requires: []
  - id: design
    generates: design.md
    description: Technical design document explaining how to implement the change
    template: design.md
    instruction: >
      Generate a design document that explains how to implement this change.

      Focus only on the technical design decisions that directly affect task decomposition, boundaries, module structure, and interfaces.

      Do not include low-level code snippets or redundant explanations that do not guide task-level execution.
    requires:
      - proposal
  - id: specs
    generates: specs/**/*.md
    description: Capability specification files that define what the system should do
    template: spec.md
    instruction: >
      Generate specification files that define what the system should do.

      Define behavior contracts and user-visible scenarios only. Do not specify internal code structures or private helper details.
    requires:
      - proposal
      - design
  - id: tasks
    generates: tasks.md
    description: Executable task list using Slice Contracts
    template: tasks.md
    instruction: >
      Generate a task list that breaks implementation work into verifiable steps.

      Define tasks using a Stage Acceptance Coverage Map (referencing Stage AC IDs only) and Slice Contracts.
      
      For each implementation slice, define a Slice Contract containing:
      - Slice Goal & Slice Acceptance Criteria
      - Default Allowed File Scope
      - TDD Contract (required | not-applicable) & TDD Test Files
      - RED Command & GREEN Command & Additional Verification Commands
      - Boundary Mode (final | slice | per-task)
      - Verifier Gate reference

      Individual tasks within a slice must refer to the Slice Contract and declare only overrides (e.g. Overrides: Allowed File Scope) if they differ.

      Include an explicit verifier gate task at the end of each slice.
    requires:
      - specs
      - design

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Implement the change tasks under the direction of the Executor.
    The Executor coordinates dispatches based on the Proof Posture (P0, P1, P2) and Boundary Mode.
    Follow TDD rules for code-changing tasks. Worker writes RED/GREEN/REFACTOR evidence into response packets rather than creating local physical files.
    The Code Verifier gate checks the assembled Evidence Packet before passing.
