name: proofloop-spec-driven
version: 3
description: ProofLoop OpenSpec workflow schema focused on Brain Dispatch Contract preservation, mechanical execution, slice verification, git boundary closure, and archive readiness.

artifacts:
  - id: proposal
    generates: proposal.md
    description: Proposal document explaining why this OpenSpec change is needed.
    template: proposal.md
    instruction: >
      Generate a proposal that preserves the Brain Dispatch Contract, user goal,
      scope, out-of-scope boundaries, acceptance criteria, minimum closed loop,
      risks, and code reality anchors.
      Do not rewrite or weaken Brain acceptance criteria.
    requires: []

  - id: design
    generates: design.md
    description: Technical design document explaining implementation decisions that affect decomposition.
    template: design.md
    instruction: >
      Generate a design that only contains technical decisions needed for task
      decomposition, boundaries, module structure, interfaces, state, persistence,
      verification, and git boundary strategy.
    requires:
      - proposal

  - id: specs
    generates: specs/**/*.md
    description: Capability specification files.
    template: spec.md
    instruction: >
      Generate behavior contracts and scenarios only.
    requires:
      - proposal
      - design

  - id: tasks
    generates: tasks.md
    description: Executable task list using Slice Contracts.
    template: tasks.md
    instruction: >
      Generate tasks that allow Executor and Worker to proceed mechanically.
      Every implementation slice must have a Code Verifier gate.
      Default git boundary:
      - task output produces task-diff-snapshot receipt
      - slice verifier PASS produces slice-output commit
      - archive output is committed separately
    requires:
      - specs
      - design

  - id: evidence-ledger
    generates: proofloop/evidence-ledger.md
    description: ProofLoop evidence ledger initialized from Brain Dispatch Contract.
    template: evidence-ledger.md
    instruction: >
      Generate an evidence ledger seeded from the Brain Dispatch Contract.
      The ledger records contract snapshots, planning results, execution receipts,
      slice verification results, stage review, and archive result.
      It must not introduce new requirements.
    requires:
      - proposal

apply:
  requires:
    - tasks
    - evidence-ledger
  tracks: tasks.md
  instruction: |
    Executor handles OpenSpec change execution.
    Direct Tasks are not handled by this schema.

    Executor must:
    - follow tasks.md and Slice Contracts
    - dispatch Worker for tasks
    - collect Completion Receipts
    - dispatch Committer for task-diff-snapshot receipts after Worker tasks
    - assemble Evidence Packets
    - dispatch Code Verifier for every slice
    - dispatch Committer for slice-output commit after slice verifier PASS
    - stop and return blockers to Brain when contracts are insufficient

    High-risk requirements are handled through Required Review Skills, not a separate P2 flow.
